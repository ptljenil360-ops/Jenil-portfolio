<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Humanoid & Particles Preview</title>
    <style>
        body { margin: 0; padding: 0; background: black; overflow-x: hidden; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #root { width: 100%; min-height: 100vh; }
        .section-label {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18",
            "react-dom": "https://esm.sh/react-dom@18",
            "react-dom/client": "https://esm.sh/react-dom@18/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.11?external=three,react,react-dom",
            "htm": "https://esm.sh/htm@3.1.1"
        }
    }
    </script>

    <script type="module">
        import React, { useRef, useEffect, useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Canvas, useFrame } from '@react-three/fiber';
        import htm from 'htm';

        const html = htm.bind(React.createElement);

        // Simple stylized "humanoid" built from primitives
        function Humanoid({ scrollProgress }) {
            const group = useRef();

            useFrame(() => {
                if (!group.current) return;
                // subtle idle + scroll-driven motion
                group.current.rotation.y = scrollProgress * Math.PI * 1.5;
                group.current.rotation.x = Math.sin(scrollProgress * Math.PI) * 0.2;
                group.current.position.y = Math.sin(scrollProgress * Math.PI * 2) * 0.3 - 0.5;
            });

            return html`
                <group ref=${group} position=${[0, -0.5, 0]}>
                    <!-- head -->
                    <mesh position=${[0, 1.6, 0]}>
                        <sphereGeometry args=${[0.35, 32, 32]} />
                        <meshStandardMaterial color="#eeeeee" roughness=${0.3} metalness=${0.2} />
                    </mesh>

                    <!-- torso -->
                    <mesh position=${[0, 0.7, 0]}>
                        <capsuleGeometry args=${[0.35, 1.1, 8, 16]} />
                        <meshStandardMaterial color="#dddddd" />
                    </mesh>

                    <!-- left arm -->
                    <group position=${[-0.6, 0.9, 0]} rotation=${[0, 0, 0.2]}>
                        <mesh position=${[0, -0.6, 0]}>
                            <capsuleGeometry args=${[0.15, 0.9, 8, 16]} />
                            <meshStandardMaterial color="#cccccc" />
                        </mesh>
                    </group>

                    <!-- right arm -->
                    <group position=${[0.6, 0.9, 0]} rotation=${[0, 0, -0.2]}>
                        <mesh position=${[0, -0.6, 0]}>
                            <capsuleGeometry args=${[0.15, 0.9, 8, 16]} />
                            <meshStandardMaterial color="#cccccc" />
                        </mesh>
                    </group>

                    <!-- left leg -->
                    <mesh position=${[-0.25, -0.6, 0]}>
                        <capsuleGeometry args=${[0.18, 1.1, 8, 16]} />
                        <meshStandardMaterial color="#bbbbbb" />
                    </mesh>

                    <!-- right leg -->
                    <mesh position=${[0.25, -0.6, 0]}>
                        <capsuleGeometry args=${[0.18, 1.1, 8, 16]} />
                        <meshStandardMaterial color="#bbbbbb" />
                    </mesh>
                </group>
            `;
        }

        function Particles({ scrollProgress }) {
            const pointsRef = useRef();
            const count = 1500;

            const positions = useMemo(() => {
                const arr = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    arr[i * 3] = (Math.random() - 0.5) * 12;
                    arr[i * 3 + 1] = (Math.random() - 0.5) * 12;
                    arr[i * 3 + 2] = (Math.random() - 0.5) * 12;
                }
                return arr;
            }, []);

            useFrame(() => {
                if (pointsRef.current) {
                    pointsRef.current.rotation.y = scrollProgress * Math.PI * 0.8;
                }
            });

            return html`
                <points ref=${pointsRef}>
                    <bufferGeometry>
                        <bufferAttribute attach="attributes-position" count=${count} array=${positions} itemSize=${3} />
                    </bufferGeometry>
                    <pointsMaterial size=${0.04} color="#ffffff" sizeAttenuation=${true} transparent=${true} opacity=${0.8} />
                </points>
            `;
        }

        function CameraController({ scrollProgress }) {
            useFrame(({ camera }) => {
                camera.position.z = 5 - scrollProgress * 2;
                camera.position.y = scrollProgress * 1.5;
                camera.lookAt(0, 0.5, 0);
            });
            return null;
        }

        function App() {
            const [scrollProgress, setScrollProgress] = useState(0);

            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY;
                    const docHeight = document.body.scrollHeight - window.innerHeight;
                    const progress = docHeight > 0 ? scrollTop / docHeight : 0;
                    setScrollProgress(progress);
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return html`
                <div style=${{ height: '300vh', background: 'black' }}>
                    <div style=${{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100vh' }}>
                        <${Canvas}>
                            <ambientLight intensity=${0.8} />
                            <directionalLight position=${[2, 3, 5]} intensity=${1.2} />

                            <${Particles} scrollProgress=${scrollProgress} />
                            <${Humanoid} scrollProgress=${scrollProgress} />
                            <${CameraController} scrollProgress=${scrollProgress} />
                        <//>
                    </div>

                    <div class="section-label" style=${{ fontSize: '40px' }}>
                        Human-like 3D Object
                    </div>

                    <div class="section-label" style=${{ fontSize: '30px' }}>
                        Scroll Controlled Motion
                    </div>

                    <div class="section-label" style=${{ fontSize: '30px' }}>
                        Cinematic Feel
                    </div>
                </div>
            `;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
